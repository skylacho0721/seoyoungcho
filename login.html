<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 · 행정업무 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#0e0810;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(212,80,117,.15),transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(240,201,106,.07),transparent 50%);pointer-events:none;}
.card{background:#180f16;border:1px solid rgba(242,167,190,.25);border-radius:20px;padding:44px 38px;width:400px;text-align:center;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.5);}
.card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,#d45075,#f2a7be,#f0c96a,transparent);border-radius:2px;}
.logo{font-size:32px;margin-bottom:8px;}
h1{font-size:17px;font-weight:700;color:#fde8f0;margin-bottom:6px;}
p{font-size:11px;color:#7a5068;margin-bottom:30px;line-height:1.7;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:none;border-radius:10px;padding:12px 22px;width:100%;font-size:13px;font-weight:600;color:#333;cursor:pointer;transition:all .2s;text-decoration:none;}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(242,167,190,.3);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}
.div{display:flex;align-items:center;gap:12px;margin:18px 0;}
.div::before,.div::after{content:'';flex:1;height:1px;background:rgba(242,167,190,.15);}
.div span{font-size:10px;color:#7a5068;}
.demo-btn{width:100%;padding:11px;background:rgba(242,167,190,.07);border:1px solid rgba(242,167,190,.2);border-radius:10px;color:#f2a7be;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.demo-btn:hover{background:rgba(242,167,190,.14);}
.footer{margin-top:22px;font-size:9px;color:#4a3048;line-height:1.6;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">🌸</div>
  <h1>행정업무 통합 대시보드</h1>
  <p>한국외국어대학교 차이나데이터큐레이션<br>조서영 · 202304504</p>
  <a href="/auth/google" class="google-btn">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Google 계정으로 로그인
  </a>
  <div class="div"><span>또는</span></div>
  <button class="demo-btn" onclick="location.href='/auth/demo'">🔓 데모 모드로 체험하기</button>
  <div class="footer">© 2026 조서영 · 한국외국어대학교 · Powered by Claude, Anthropic</div>
</div>
</body>
</html>
